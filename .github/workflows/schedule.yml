name: Update Ads Rules

on:
  schedule:
    - cron: '0 */4 * * *'  # 每 4 小时运行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        # hosts.py 使用的是 python 自带库(urllib)，不需要额外安装依赖

    - name: Run scripts
      run: |
        echo ">>> Running Clash Rule Script..."
        python main.py
        
        echo ">>> Running Hosts Rule Script..."
        python hosts.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 同时添加两个生成的文件
        git add clash-ads-reject.yaml ads-rule-hosts.txt
        # 提交 (如果有变化)
        git commit -m "Auto-update rules: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
